<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Diverse</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 3em;
            letter-spacing: 2px;
            animation: fadeInDown 1s ease;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(3, 160px);
            gap: 20px;
        }

        button {
            padding: 20px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            transform: scale(1);
            animation: fadeInUp 1s ease;
        }

        button:hover {
            transform: scale(1.1) rotate(2deg);
            background: rgba(255,255,255,0.3);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        /* Animaciones */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Animación escalonada */
        button:nth-child(1) { animation-delay: 0.1s; }
        button:nth-child(2) { animation-delay: 0.2s; }
        button:nth-child(3) { animation-delay: 0.3s; }
        button:nth-child(4) { animation-delay: 0.4s; }
        button:nth-child(5) { animation-delay: 0.5s; }
        button:nth-child(6) { animation-delay: 0.6s; }
    </style>
</head>
<body>

    <h1>Diverse</h1>

    <div class="menu">
        <button onclick="location.href='index1.html'">Página 1</button>
        <button onclick="location.href='index2.html'">Página 2</button>
        <button onclick="location.href='index3.html'">Página 3</button>
        <button onclick="location.href='index4.html'">Página 4</button>
        <button onclick="location.href='index5.html'">Página 5</button>
        <button onclick="location.href='index6.html'">Página 6</button>
    </div>

</body>
</html>
